# MailD Configuration File - Unified config for pop3d and smtpd
# Format: key = value
# Lines starting with # are comments

# =============================================================================
# Service Enable/Disable
# =============================================================================
pop3_enabled = 1
smtp_enabled = 1

# =============================================================================
# Network Settings
# =============================================================================
# POP3 ports
pop3_port = 110
pop3s_port = 995

# SMTP ports
smtp_port = 25
submission_port = 587
smtps_port = 465

# IPv6 support
ipv6_enabled = 1

# Server hostname (used by SMTP)
hostname = localhost

# =============================================================================
# Security Settings
# =============================================================================
# Set allow_plaintext = 0 to force SSL/TLS only
allow_plaintext = 0

# Maximum concurrent connections
max_connections = 50

# Require authentication for SMTP relaying
require_auth = 1

# =============================================================================
# Message Settings (SMTP only)
# =============================================================================
# Maximum message size in bytes (50MB default)
max_msg_size = 52428800

# =============================================================================
# Timeouts (seconds)
# =============================================================================
timeout_login = 60
timeout_command = 300
timeout_data = 600

# =============================================================================
# SSL/TLS Certificate Paths
# =============================================================================
# Both services can share the same certificate, or use separate ones
cert_file = /etc/ssl/certs/maild.crt
key_file = /etc/ssl/private/maild.key

# Alternative: separate certificates
# cert_file = /etc/ssl/certs/pop3d.crt
# key_file = /etc/ssl/private/pop3d.key

# =============================================================================
# Mail Storage
# =============================================================================
# Local delivery to /var/mail/username or ~/Maildir
maildir_base = /var/mail

# =============================================================================
# Logging
# =============================================================================
log_auth = 1
