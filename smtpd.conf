# SMTPD Configuration File
# Format: key = value
# Lines starting with # are comments

# Network settings
port = 25
submission_port = 587
smtps_port = 465
ipv6_enabled = 1

# Server hostname
hostname = localhost

# Security settings
# Set allow_plaintext = 0 to force SSL/TLS only
allow_plaintext = 0

# Require authentication for relaying
require_auth = 1

# Maximum connections
max_connections = 50

# Maximum message size in bytes (50MB default)
max_msg_size = 52428800

# Timeouts (seconds)
timeout_login = 60
timeout_command = 300
timeout_data = 600

# SSL/TLS certificate paths
cert_file = /etc/ssl/certs/smtpd.crt
key_file = /etc/ssl/private/smtpd.key

# Mail storage
# Local delivery to /var/mail/username or ~/Maildir
maildir_base = /var/mail

# Logging
log_auth = 1
