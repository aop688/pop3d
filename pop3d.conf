# POP3D Configuration File
# Format: key = value
# Lines starting with # are comments

# Network settings
port = 110
ssl_port = 995
ipv6_enabled = 1

# Security settings
# Set allow_plaintext = 0 to force SSL/TLS only
allow_plaintext = 0
max_connections = 50

# Timeouts (seconds)
timeout_login = 60
timeout_command = 300

# SSL/TLS certificate paths
cert_file = /etc/ssl/certs/pop3d.crt
key_file = /etc/ssl/private/pop3d.key

# Mail storage
# Users can have mail in ~/Maildir or here
maildir_base = /var/mail

# Logging
log_auth = 1
